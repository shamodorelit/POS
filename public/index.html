<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Shamod Firezz - Retail POS</title>

<!-- IMPORTANT FIX -->
<base href="/">

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<!-- Icons -->
<link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>

<!-- CSS -->
<link rel="stylesheet" href="style.css">

</head>

<body>

<!-- Authentication Overlay -->
<div id="auth-overlay" class="auth-overlay active">

<div class="auth-box">

<div class="auth-header">
<h2>Welcome to Shamod POS</h2>
<p id="auth-subtitle">Login to your account or register a new business</p>
</div>

<form id="login-form" class="auth-form active">

<div class="form-group">
<label>Email / Username</label>
<input type="text" id="login-email" class="form-control" required placeholder="Email or 'Admin'">
</div>

<div class="form-group">
<label>Password</label>
<input type="password" id="login-password" class="form-control" required placeholder="Password">
</div>

<button type="submit" class="btn btn-primary btn-block btn-lg">Login</button>

<div class="auth-switch">
Don't have an account? <span id="switch-to-register">Register Business</span>
</div>

</form>

<form id="register-form" class="auth-form">

<div class="form-group">
<label>Business Name</label>
<input type="text" id="reg-businessName" class="form-control" required placeholder="My Awesome Shop">
</div>

<div class="form-group">
<label>WhatsApp Number</label>
<input type="tel" id="reg-whatsapp" class="form-control" required placeholder="+94711234567">
</div>

<div class="form-group">
<label>Email</label>
<input type="email" id="reg-email" class="form-control" required placeholder="you@domain.com">
</div>

<div class="form-group">
<label>Password</label>
<input type="password" id="reg-password" class="form-control" required placeholder="Strong password">
</div>

<button type="submit" class="btn btn-primary btn-block btn-lg">Register</button>

<div class="auth-switch">
Already have an account? <span id="switch-to-login">Login</span>
</div>

</form>

</div>
</div>


<!-- APP WRAPPER -->
<div id="app-wrapper" class="app-wrapper">

<header class="top-header">
<h1>Shamod POS</h1>
<div id="clock">00:00</div>
</header>

<section id="dashboard-view">

<h2>Dashboard</h2>

<div>
<p>Total Bills Today: <span id="dash-bills-today">0</span></p>
<p>Total Products: <span id="dash-total-products">0</span></p>
</div>

</section>

</div>

<!-- JS -->
<script src="app.js"></script>

</body>
</html>
